<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Language Tools - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 300px 300px 1fr;
            height: 100vh;
        }

        /* Left sidebar - Workspaces */
        .workspaces-sidebar {
            background: #2c2c2c;
            color: #cccccc;
            overflow-y: scroll;
            border-right: 1px solid #1e1e1e;
        }

        .workspaces-sidebar::-webkit-scrollbar {
            width: 10px;
        }

        .workspaces-sidebar::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .workspaces-sidebar::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }

        .workspaces-sidebar::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }

        .sidebar-header {
            padding: 0;
            background: #252526;
            border-bottom: 1px solid #1e1e1e;
        }

        .tabs {
            display: flex;
        }

        .tab {
            flex: 1;
            padding: 0.75rem 1rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            background: #2a2a2a;
        }

        .tab.active {
            border-bottom-color: #007acc;
            color: #ffffff;
        }

        .workspace-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .workspace-item:hover {
            background: #37373d;
        }

        .workspace-item.active {
            background: #37373d;
            border-left-color: #007acc;
        }

        .workspace-uri {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .workspace-uri:hover {
            color: #ffffff;
        }

        .close-workspace-btn {
            background: transparent;
            border: none;
            color: #858585;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 0.5rem;
            line-height: 1;
            transition: color 0.2s;
        }

        .close-workspace-btn:hover {
            color: #ff4444;
        }

        .workspace-meta {
            font-size: 0.75rem;
            color: #858585;
            display: flex;
            gap: 0.5rem;
        }

        .workspace-section {
            margin-top: 0.5rem;
            padding-left: 0.5rem;
        }

        .workspace-section-title {
            font-size: 0.7rem;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .workspace-section-item {
            font-size: 0.75rem;
            color: #858585;
            padding: 0.15rem 0;
        }

        .client-time {
            font-size: 0.65rem;
            color: #b0b0b0;
            font-family: 'Courier New', monospace;
            margin-left: 0.25rem;
        }

        .empty-workspaces {
            padding: 2rem 1rem;
            color: #858585;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .empty-workspaces-title {
            font-size: 1rem;
            font-weight: 600;
            color: #cccccc;
            margin-bottom: 1rem;
        }

        .empty-workspaces-text {
            margin-bottom: 0.75rem;
        }

        .empty-workspaces-hint {
            color: #007acc;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: #2a2a2a;
            border-radius: 3px;
        }

        /* Middle sidebar - LSP Servers */
        .servers-sidebar {
            background: #252526;
            color: #cccccc;
            overflow-y: scroll;
            border-right: 1px solid #1e1e1e;
        }

        .servers-sidebar::-webkit-scrollbar {
            width: 10px;
        }

        .servers-sidebar::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .servers-sidebar::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }

        .servers-sidebar::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }

        .server-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            border-bottom: 1px solid #3a3a3a;
            position: relative;
            background: #1e1e1e;
        }

        .server-item:hover {
            background: #2a2d2e;
        }

        .server-item.active {
            background: #2a2d2e;
            border-left-color: #007acc;
        }

        /* Visual distinction for external (IDE) servers */
        .server-item-external {
            background: #1a2a1a;
        }

        .server-item-external:hover {
            background: #243024;
        }

        .server-item-external.active {
            background: #243024;
            border-left-color: #4ec9b0;
        }

        /* Visual distinction for MCP-managed servers */
        .server-item-managed {
            background: #1e1e1e;
        }

        .server-source-icon {
            font-size: 0.9rem;
            margin-right: 0.25rem;
        }

        .server-actions {
            display: none;
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            gap: 0.25rem;
        }

        .server-item:hover .server-actions {
            display: flex;
        }

        .server-action-btn {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #cccccc;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .server-action-btn:hover {
            background: #007acc;
            border-color: #007acc;
        }


        .server-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .server-id {
            font-size: 0.75rem;
            color: #858585;
            font-family: 'Courier New', monospace;
            margin-bottom: 0.5rem;
        }

        .server-ide-info {
            font-size: 0.65rem;
            color: #00bfa5;
            font-family: 'Courier New', monospace;
            margin-left: 0.5rem;
            display: inline-flex;
            gap: 0.4rem;
        }

        .server-ide-info span {
            background: rgba(0, 191, 165, 0.15);
            padding: 0.15rem 0.35rem;
            border-radius: 2px;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }

        .status-starting { background: #ffa500; color: white; }
        .status-running { background: #28a745; color: white; }
        .status-stopping { background: #ff9800; color: white; }
        .status-stopped { background: #6c757d; color: white; }
        .status-installing { background: #ffc107; color: black; }
        .status-install_failed { background: #dc3545; color: white; }
        .status-start_failed { background: #ff6b6b; color: white; }
        .status-switching { background: #17a2b8; color: white; }
        .status-connecting_to_ide { background: #9b59b6; color: white; }
        .status-connected_to_ide { background: #00897b; color: white; font-weight: 600; }
        .status-disconnecting { background: #ab47bc; color: white; }

        .servers-placeholder {
            padding: 2rem 1rem;
            text-align: center;
            color: #858585;
            font-size: 0.85rem;
        }

        /* Main content - Console */
        .console-container {
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .search-box {
            position: absolute;
            top: 50px;
            right: 20px;
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 0.5rem;
            display: none;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .search-box.visible {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-box input {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #cccccc;
            padding: 0.4rem 0.6rem;
            border-radius: 3px;
            font-size: 0.85rem;
            width: 200px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #007acc;
        }

        .search-box button {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #cccccc;
            padding: 0.4rem 0.6rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .search-box button:hover {
            background: #505050;
        }

        .search-count {
            color: #858585;
            font-size: 0.85rem;
        }

        .search-close {
            color: #858585;
            cursor: pointer;
            padding: 0 0.5rem;
            font-size: 1.2rem;
        }

        .search-close:hover {
            color: #cccccc;
        }

        .highlight {
            background: #4a4a00;
            color: #ffff00;
        }

        .highlight.current {
            background: #ff9800;
            color: #000;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: #2d2d30;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 1.5rem;
            min-width: 400px;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #cccccc;
            margin-bottom: 1rem;
        }

        .modal-message {
            color: #cccccc;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        .modal-button {
            padding: 0.5rem 1.25rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .modal-button.primary {
            background: #007acc;
            color: white;
        }

        .modal-button.primary:hover {
            background: #005a9e;
        }

        .modal-button.danger {
            background: #dc3545;
            color: white;
        }

        .modal-button.danger:hover {
            background: #c82333;
        }

        .modal-button.secondary {
            background: #3c3c3c;
            color: #cccccc;
            border: 1px solid #555;
        }

        .modal-button.secondary:hover {
            background: #505050;
        }

        .console-header {
            background: #252526;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #1e1e1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            gap: 1rem;
        }

        .console-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab-button {
            background: transparent;
            border: none;
            color: #cccccc;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .tab-button:hover {
            color: #ffffff;
            border-bottom-color: #555;
        }

        .tab-button.active {
            color: #ffffff;
            border-bottom-color: #007acc;
        }

        .tab-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .tab-panel {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .tab-panel.active {
            display: flex;
        }

        .install-panel {
            padding: 1.5rem;
            overflow-y: auto;
        }

        .install-panel h3 {
            color: #cccccc;
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
        }

        .install-info {
            background: #1e1e1e;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .install-info p {
            margin: 0.5rem 0;
            color: #cccccc;
        }

        .install-button {
            background: #007acc;
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .install-button:hover {
            background: #005a9e;
        }

        .install-output {
            margin-top: 1.5rem;
            background: #1e1e1e;
            padding: 1rem;
            border-radius: 4px;
            min-height: 100px;
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .install-output pre {
            margin: 0;
            white-space: pre-wrap;
        }

        .install-output .error {
            color: #f48771;
        }

        .install-status, .install-success, .install-error {
            padding: 1rem;
        }

        .install-status {
            text-align: center;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #007acc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .install-success h4 {
            color: #4caf50;
            margin: 0 0 1rem 0;
        }

        .install-error h4 {
            color: #f48771;
            margin: 0 0 1rem 0;
        }

        .error-details {
            background: #1a1a1a;
            padding: 0.75rem;
            border-radius: 4px;
            margin: 0.75rem 0;
        }

        .error-details pre {
            margin: 0.5rem 0 0 0;
            color: #f48771;
            font-size: 0.85rem;
        }

        .hint {
            color: #888;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .installer-editor {
            margin: 1rem 0;
            border: 1px solid #444;
            border-radius: 4px;
            overflow: hidden;
        }

        .editor-header {
            background: #2d2d30;
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .editor-header span {
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .editor-actions {
            display: flex;
            gap: 0.5rem;
        }

        .editor-btn {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #cccccc;
            padding: 0.25rem 0.75rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .editor-btn:hover {
            background: #007acc;
            border-color: #007acc;
        }

        .json-editor {
            width: 100%;
            min-height: 300px;
            max-height: 500px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }

        .json-editor:focus {
            background: #252526;
        }

        .details-panel {
            padding: 1.5rem;
            overflow-y: auto;
        }

        .details-panel h3 {
            color: #cccccc;
            margin: 0 0 1.5rem 0;
            font-size: 1.1rem;
        }

        .details-section {
            background: #1e1e1e;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .details-section h4 {
            color: #007acc;
            margin: 0 0 0.75rem 0;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .detail-item {
            display: flex;
            margin-bottom: 0.5rem;
            color: #cccccc;
        }

        .detail-label {
            font-weight: 600;
            min-width: 120px;
            color: #888888;
        }

        .detail-value {
            color: #cccccc;
        }

        .selector-item {
            background: #252526;
            padding: 0.5rem;
            border-radius: 3px;
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .selector-tag {
            background: #007acc;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
        }

        .command-preview {
            background: #252526;
            padding: 0.75rem;
            border-radius: 3px;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            margin: 0;
        }

        .console-title {
            color: #cccccc;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-indicator.connected { background: #28a745; }
        .status-indicator.disconnected { background: #dc3545; }

        .console-controls {
            display: flex;
            gap: 0.5rem;
        }

        .console-controls button {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 3px;
            background: #007acc;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .console-controls button:hover {
            background: #005a9e;
        }

        .console {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #d4d4d4;
            min-height: 0;
            user-select: text;
            cursor: default;
        }

        .console * {
            cursor: text;
        }

        .console .trace-toggle {
            cursor: pointer !important;
        }

        .console:focus {
            outline: 1px solid #007acc;
            outline-offset: -1px;
        }

        .console::-webkit-scrollbar {
            width: 12px;
        }

        .console::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .console::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 6px;
        }

        .console::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }

        .trace-line {
            /* No margin between traces */
        }

        .trace-header {
            font-size: 12px;
            display: flex;
            align-items: flex-start;
            position: relative;
            cursor: pointer;
        }

        .trace-toggle {
            user-select: none;
            cursor: pointer;
            padding: 2px;
            margin-right: 0.5rem;
        }

        .trace-toggle:hover {
            background: #3a3a3a;
            border-radius: 2px;
        }

        .trace-header-text {
            user-select: text;
        }

        .trace-body {
            user-select: text;
        }

        .trace-header:hover {
            background: #2a2a2a;
        }

        .trace-tooltip {
            display: none;
            position: fixed;
            background: #2d2d30;
            border: 1px solid #007acc;
            border-radius: 4px;
            padding: 0.75rem;
            max-width: 500px;
            max-height: 300px;
            overflow: auto;
            z-index: 10000;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 11px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .trace-line:hover .trace-tooltip {
            display: block;
        }

        .trace-tooltip::-webkit-scrollbar {
            width: 8px;
        }

        .trace-tooltip::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .trace-tooltip::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 4px;
        }

        .trace-toggle {
            color: #808080;
            margin-right: 0.5rem;
            font-family: monospace;
            display: inline-block;
            width: 12px;
            flex-shrink: 0;
        }

        .trace-header-text {
            color: #cccccc;
            white-space: pre-wrap;
            word-wrap: break-word;
            flex: 1;
        }

        .trace-body {
            margin-left: 1.5rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            transition: all 0.2s ease;
        }

        .trace-body.collapsed {
            height: 0;
            opacity: 0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .trace-body.expanded {
            height: auto;
            opacity: 1;
            padding: 0 0.25rem 0.25rem 0.25rem;
        }

        /* Version cachée pour la copie quand plié */
        .trace-body.collapsed::after {
            content: attr(data-content);
            position: absolute;
            left: -9999px;
            white-space: pre-wrap;
        }

        #console-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            background: #1e1e1e;
        }

        .placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #858585;
            font-size: 0.9rem;
        }

        /* Confirmation Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 6px;
            padding: 1.5rem;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        .modal-message {
            color: #cccccc;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .modal-uri {
            font-family: monospace;
            background: #1e1e1e;
            padding: 0.5rem;
            border-radius: 4px;
            margin: 0.5rem 0;
            word-break: break-all;
        }

        .modal-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .modal-button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .modal-button-cancel {
            background: #3e3e42;
            color: #cccccc;
        }

        .modal-button-cancel:hover {
            background: #4e4e52;
        }

        .modal-button-confirm {
            background: #d73a49;
            color: #ffffff;
        }

        .modal-button-confirm:hover {
            background: #e14856;
        }

        .console-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Left: Workspaces or All Servers -->
        <div class="workspaces-sidebar">
            <div class="sidebar-header">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('workspaces', this)">Workspaces</div>
                    <div class="tab" onclick="switchTab('all-servers', this)">Servers</div>
                </div>
            </div>
            <div id="workspaces-list"></div>
            <div id="all-servers-list" style="display: none;"></div>
        </div>

        <!-- Middle: LSP Servers -->
        <div class="servers-sidebar">
            <div id="servers-list"></div>
        </div>

        <!-- Right: Console -->
        <div class="console-container" id="console-container">
            <div class="search-box" id="search-box">
                <input type="text" id="search-input" placeholder="Find in console..." />
                <span class="search-count" id="search-count">0/0</span>
                <button onclick="searchPrev()">↑</button>
                <button onclick="searchNext()">↓</button>
                <span class="search-close" onclick="closeSearch()">×</span>
            </div>
            <div id="console-area">
                <div class="placeholder">
                    ← Select a workspace and LSP server to view console
                </div>
            </div>
        </div>
    </div>

    <script>
        let workspaces = [];
        let selectedWorkspace = null;
        let selectedServer = null;
        let selectedAllServer = null; // Track selected server in "All Servers" tab
        let eventSource = null;
        let tracesByServer = {}; // Store traces per server: {serverId: [...traces]}
        let currentTab = 'workspaces';
        let allServersLoaded = false;

        function switchTab(tab, element) {
            currentTab = tab;

            // Update tab UI
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (element) {
                element.classList.add('active');
            }

            // Show/hide content and adjust layout
            const appContainer = document.querySelector('.app-container');
            const serversColumn = document.querySelector('.servers-sidebar');
            const consoleColumn = document.querySelector('.console-container');

            if (tab === 'workspaces') {
                document.getElementById('workspaces-list').style.display = 'block';
                document.getElementById('all-servers-list').style.display = 'none';
                serversColumn.style.display = 'block';
                consoleColumn.style.display = 'flex';
                // 3 columns layout: workspaces | servers | console
                appContainer.style.gridTemplateColumns = '300px 300px 1fr';
                consoleColumn.style.gridColumn = '3';

                // If we have a selected workspace and server, reload the console
                if (selectedWorkspace && selectedServer) {
                    loadConsole(selectedServer);
                }
            } else {
                document.getElementById('workspaces-list').style.display = 'none';
                document.getElementById('all-servers-list').style.display = 'block';
                serversColumn.style.display = 'none';
                // 2 columns layout: servers | console
                appContainer.style.gridTemplateColumns = '300px 1fr';
                consoleColumn.style.gridColumn = '2';

                // Load servers if not already loaded
                if (!allServersLoaded) {
                    loadAllServers();
                } else {
                    // Already loaded, just show details of previously selected server (or first)
                    fetch('/api/admin/servers')
                        .then(response => response.json())
                        .then(servers => {
                            if (servers.length > 0) {
                                const previousServerExists = selectedAllServer && servers.find(s => s.id === selectedAllServer);
                                const serverToShow = previousServerExists ? selectedAllServer : servers[0].id;
                                showServerDetails(serverToShow);
                            }
                        });
                }
            }
        }

        async function loadAllServers() {
            try {
                const response = await fetch('/api/admin/servers');
                const servers = await response.json();

                const container = document.getElementById('all-servers-list');
                if (!container) {
                    console.error('all-servers-list container not found');
                    return;
                }
                container.innerHTML = servers.map(server => {
                    const isActive = selectedAllServer === server.id ? 'active' : '';
                    return `
                        <div class="server-item ${isActive}" onclick="showServerDetails('${server.id}')">
                            <div class="server-name">${server.name}</div>
                            <div class="server-id">${server.id}</div>
                        </div>
                    `;
                }).join('');
                console.log('All servers rendered:', servers.length, 'selectedAllServer:', selectedAllServer);

                allServersLoaded = true;

                // Auto-select previously selected server if it exists, otherwise first server
                if (servers.length > 0) {
                    const previousServerExists = selectedAllServer && servers.find(s => s.id === selectedAllServer);
                    const serverToShow = previousServerExists ? selectedAllServer : servers[0].id;
                    showServerDetails(serverToShow);
                }
            } catch (error) {
                console.error('Failed to load all servers:', error);
            }
        }

        async function showServerDetails(serverId) {
            console.log('showServerDetails called for:', serverId);

            // Update selected server and refresh list to show active state
            selectedAllServer = serverId;

            // Re-render server list to update active state
            const response = await fetch('/api/admin/servers');
            const servers = await response.json();
            const container = document.getElementById('all-servers-list');
            container.innerHTML = servers.map(server => {
                const isActive = selectedAllServer === server.id ? 'active' : '';
                return `
                    <div class="server-item ${isActive}" onclick="showServerDetails('${server.id}')">
                        <div class="server-name">${server.name}</div>
                        <div class="server-id">${server.id}</div>
                    </div>
                `;
            }).join('');

            try {
                // Show console column and adjust grid
                const appContainer = document.querySelector('.app-container');
                const consoleColumn = document.querySelector('.console-container');
                console.log('Console column:', consoleColumn);
                consoleColumn.style.display = 'flex';
                // 2 columns: left sidebar (300px) + console (rest), console in position 2
                appContainer.style.gridTemplateColumns = '300px 1fr';
                consoleColumn.style.gridColumn = '2';

                // Fetch server details
                console.log('Fetching details for:', serverId);
                const response = await fetch(`/api/admin/servers/${serverId}/details`);
                console.log('Response status:', response.status);
                const details = await response.json();
                console.log('Details received:', details);

                // Format command (can be string or object)
                let commandStr = '';
                if (details.command) {
                    if (typeof details.command === 'string') {
                        commandStr = details.command;
                    } else if (typeof details.command === 'object') {
                        commandStr = JSON.stringify(details.command, null, 2);
                    }
                }

                // Show in console area
                const html = `
                    <div class="details-panel" style="padding: 2rem; color: #cccccc; overflow-y: auto;">
                        <h2 style="margin-bottom: 1.5rem; color: #ffffff;">${details.name || details.id}</h2>

                        <div style="margin-bottom: 1.5rem;">
                            <h3 style="color: #007acc; font-size: 0.9rem; margin-bottom: 0.5rem;">SERVER ID</h3>
                            <div style="font-family: monospace; background: #1e1e1e; padding: 0.5rem; border-radius: 4px;">${details.id}</div>
                        </div>

                        ${commandStr ? `
                        <div style="margin-bottom: 1.5rem;">
                            <h3 style="color: #007acc; font-size: 0.9rem; margin-bottom: 0.5rem;">COMMAND</h3>
                            <pre style="font-family: monospace; background: #1e1e1e; padding: 0.5rem; border-radius: 4px; word-break: break-all; white-space: pre-wrap; margin: 0;">${commandStr}</pre>
                        </div>
                        ` : ''}

                        ${details.documentSelector && details.documentSelector.length > 0 ? `
                        <div style="margin-bottom: 1.5rem;">
                            <h3 style="color: #007acc; font-size: 0.9rem; margin-bottom: 0.5rem;">DOCUMENT SELECTOR</h3>
                            <div style="font-family: monospace; background: #1e1e1e; padding: 0.5rem; border-radius: 4px;">
                                ${details.documentSelector.map(sel =>
                                    `<div>${sel.language ? 'Language: ' + sel.language : ''} ${sel.scheme ? 'Scheme: ' + sel.scheme : ''} ${sel.pattern ? 'Pattern: ' + sel.pattern : ''}</div>`
                                ).join('')}
                            </div>
                        </div>
                        ` : ''}

                        <div style="margin-top: 2rem; padding: 1rem; background: #252526; border-left: 3px solid #007acc; border-radius: 4px;">
                            <strong>Note:</strong> To run this server, open a workspace using an MCP client.
                        </div>
                    </div>
                `;

                const consoleArea = document.getElementById('console-area');
                console.log('console-area element:', consoleArea);
                console.log('HTML to insert:', html.substring(0, 200));
                consoleArea.innerHTML = html;
                console.log('innerHTML set, now checking:', consoleArea.innerHTML.substring(0, 100));
            } catch (error) {
                console.error('Failed to load server details:', error);
                document.getElementById('console-area').innerHTML = `
                    <div class="placeholder" style="color: #ff6b6b;">
                        Failed to load server details
                    </div>
                `;
            }
        }

        // Load workspaces
        async function loadWorkspaces() {
            try {
                const response = await fetch('/api/admin/workspaces');
                workspaces = await response.json();
                renderWorkspaces();

                // Auto-select first workspace if available
                if (workspaces.length > 0 && !selectedWorkspace) {
                    selectWorkspace(workspaces[0].rootUri);
                }
            } catch (error) {
                console.error('Failed to load workspaces:', error);
            }
        }

        function renderWorkspaces() {
            const container = document.getElementById('workspaces-list');

            if (workspaces.length === 0) {
                container.innerHTML = `
                    <div class="empty-workspaces">
                        <div class="empty-workspaces-title">No Workspaces Yet</div>
                        <div class="empty-workspaces-text">
                            Workspaces appear when an MCP client (Claude Desktop, Bob Shell, etc.)
                            calls an MCP tool with a <code>cwd</code> parameter.
                        </div>
                        <div class="empty-workspaces-text">
                            The <code>cwd</code> (current working directory) identifies the project/workspace
                            and triggers LSP server initialization.
                        </div>
                        <div class="empty-workspaces-hint">
                            💡 Try calling: getDiagnostics(cwd: "/path/to/project", fileUri: "file://...")
                        </div>
                    </div>
                `;

                // Clear servers and console
                selectedWorkspace = null;
                selectedServer = null;
                document.getElementById('servers-list').innerHTML = '<div class="servers-placeholder">No workspaces selected</div>';
                document.getElementById('console-area').innerHTML = `
                    <div class="placeholder">
                        ← Select a workspace and LSP server to view console
                    </div>
                `;

                return;
            }

            container.innerHTML = workspaces.map(ws => {
                // Extract folder name from URI
                const folderName = ws.rootUri.split('/').filter(p => p).pop() || ws.rootUri;

                return `
                <div class="workspace-item ${ws.rootUri === selectedWorkspace ? 'active' : ''}">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="workspace-uri" title="${ws.rootUri}" onclick="selectWorkspace('${ws.rootUri}')" style="flex: 1;">📂 ${folderName}</div>
                        <button class="close-workspace-btn" onclick="event.stopPropagation(); closeWorkspace('${ws.rootUri}')" title="Close workspace and stop all servers">×</button>
                    </div>
                    ${ws.mcpClients && ws.mcpClients.length > 0 ? `
                        <div class="workspace-section">
                            <div class="workspace-section-title">AI Clients</div>
                            ${ws.mcpClients.map(client => {
                                const date = new Date(client.connectedAt);
                                const time = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                                return `<div class="workspace-section-item" title="${client.connectedAt}">📱 ${client.name} <span class="client-time">@ ${time}</span></div>`;
                            }).join('')}
                        </div>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        function selectWorkspace(uri) {
            selectedWorkspace = uri;
            selectedServer = null;

            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }

            renderWorkspaces();
            loadServers(uri);
            showPlaceholder();
        }

        function showConfirmModal(title, message, onConfirm) {
            console.log('showConfirmModal called', title);
            const titleEl = document.getElementById('modal-title');
            const messageEl = document.getElementById('modal-message');
            const modalEl = document.getElementById('confirm-modal');

            console.log('Elements found:', { titleEl, messageEl, modalEl });

            if (!titleEl || !messageEl || !modalEl) {
                console.error('Modal elements not found!');
                return;
            }

            titleEl.textContent = title;
            messageEl.innerHTML = message;
            modalEl.classList.add('visible');

            const confirmBtn = document.getElementById('modal-confirm-btn');
            confirmBtn.onclick = () => {
                hideConfirmModal();
                onConfirm();
            };
        }

        function hideConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('visible');
        }

        async function closeWorkspace(uri) {
            const folderName = uri.split('/').filter(p => p).pop() || uri;

            showConfirmModal(
                'Close Workspace',
                `
                    <div style="margin-bottom: 1rem; font-size: 1.05rem;"><strong>⚠️ This will shut down all LSP servers for this workspace</strong></div>
                    <div style="margin-bottom: 0.75rem;">Specifically:</div>
                    <ul style="margin: 0 0 1rem 1.5rem; text-align: left; line-height: 1.6;">
                        <li><strong>Stop all running language servers</strong></li>
                        <li>Disconnect any IDE connections</li>
                        <li>Remove the workspace from memory</li>
                        <li>Clear all cached data</li>
                    </ul>
                    <div style="margin-top: 1rem; padding: 0.75rem; background: rgba(0,122,204,0.1); border-left: 3px solid #007acc; border-radius: 3px;">
                        <div><strong>Workspace:</strong> ${folderName}</div>
                        <div style="margin-top: 0.5rem; font-size: 0.85rem; color: #cccccc;">💡 The workspace will automatically reappear when an MCP client accesses it again.</div>
                    </div>
                `,
                async () => {
                    try {
                        const response = await fetch(`/api/admin/workspaces/${encodeURIComponent(uri)}`, {
                            method: 'DELETE'
                        });

                        if (!response.ok) {
                            throw new Error('Failed to close workspace');
                        }

                        // Reload workspaces list
                        await loadWorkspaces();

                        console.log('Workspace closed:', uri);
                    } catch (error) {
                        console.error('Failed to close workspace:', error);
                        alert('Failed to close workspace: ' + error.message);
                    }
                }
            );
        }

        async function loadServers(uri) {
            try {
                const response = await fetch('/api/admin/workspaces/' + encodeURIComponent(uri));
                const workspace = await response.json();
                renderServers(workspace.lspServers);
            } catch (error) {
                console.error('Failed to load servers:', error);
            }
        }

        function formatStatusLabel(status, externalInstance) {
            const labels = {
                'STARTING': 'Starting',
                'RUNNING': 'Running',
                'STOPPING': 'Stopping',
                'STOPPED': 'Stopped',
                'INSTALLING': 'Installing',
                'INSTALL_FAILED': 'Install Failed',
                'START_FAILED': 'Start Failed',
                'SWITCHING': 'Switching',
                'CONNECTING_TO_IDE': 'Connecting to IDE',
                'CONNECTED_TO_IDE': 'Connected to IDE',
                'DISCONNECTING': 'Disconnecting'
            };

            // If connected to IDE and we have client info, show it
            if (status === 'CONNECTED_TO_IDE' && externalInstance && externalInstance.clientName) {
                const version = externalInstance.clientVersion ? ` ${externalInstance.clientVersion}` : '';
                return `Connected to ${externalInstance.clientName}${version}`;
            }

            return labels[status] || status;
        }

        function renderServers(servers) {
            const container = document.getElementById('servers-list');

            if (servers.length === 0) {
                container.innerHTML = '<div class="servers-placeholder">No LSP servers</div>';
                return;
            }

            container.innerHTML = servers.map(server => {
                // Check if this is an external instance (connected to IDE)
                const isExternal = server.externalInstance != null &&
                                   (server.status === 'CONNECTED_TO_IDE' || server.status === 'CONNECTING_TO_IDE');
                const serverClass = isExternal ? 'server-item-external' : 'server-item-managed';

                // Display actions based on status
                let actions = '';
                if (isExternal) {
                    // For IDE-connected servers: offer to disconnect
                    actions = `
                        <button class="server-action-btn server-action-disconnect"
                                onclick='event.stopPropagation(); disconnectFromIdeAction("${server.id}")'
                                title="Disconnect from IDE">⏏</button>
                    `;
                } else {
                    // For MCP-managed servers
                    if (server.status === 'RUNNING' || server.status === 'STARTING') {
                        actions = `
                            <button class="server-action-btn" onclick='event.stopPropagation(); restartServerAction("${server.id}")' title="Restart">↻</button>
                            <button class="server-action-btn" onclick='event.stopPropagation(); stopServerAction("${server.id}")' title="Stop">■</button>
                        `;
                    } else if (server.status === 'STOPPED') {
                        // Offer to start MCP-managed or connect to IDE
                        actions = `
                            <button class="server-action-btn" onclick='event.stopPropagation(); startManagedServerAction("${server.id}")' title="Start MCP-managed server">▶</button>
                            <button class="server-action-btn" onclick='event.stopPropagation(); connectToIdeAction("${server.id}")' title="Try to connect to IDE instance">🔗</button>
                        `;
                    }
                }

                // Build source indicator
                const sourceIcon = isExternal ? '🔗' : '🚀';
                const sourceLabel = isExternal
                    ? `Connected to IDE (port ${server.externalInstance.port}, PID ${server.externalInstance.pid})`
                    : 'Managed by MCP';

                // Build IDE info display (port/PID)
                let ideInfo = '';
                if (isExternal && server.externalInstance) {
                    ideInfo = `
                        <span class="server-ide-info">
                            <span title="Port">:${server.externalInstance.port}</span>
                            <span title="Process ID">PID ${server.externalInstance.pid}</span>
                        </span>
                    `;
                }

                // Build tooltip with command if available
                const tooltipText = server.command ? `Command: ${server.command}` : '';

                return `
                    <div class="server-item ${serverClass} ${selectedServer?.id === server.id ? 'active' : ''}"
                         onclick='selectServer(${JSON.stringify(server)})'
                         ${tooltipText ? `title="${tooltipText.replace(/"/g, '&quot;')}"` : ''}>
                        <div class="server-name">
                            <span class="server-source-icon" title="${sourceLabel}">${sourceIcon}</span>
                            ${server.name}
                        </div>
                        <div class="server-id">${server.id}</div>
                        <div>
                            <span class="status-badge status-${server.status.toLowerCase()}">${formatStatusLabel(server.status, server.externalInstance)}</span>
                            ${ideInfo}
                            ${server.pid ? `<span class="server-ide-info"><span title="Process ID">${server.pid}</span></span>` : ''}
                        </div>
                        <div class="server-actions">
                            ${actions}
                        </div>
                    </div>
                `;
            }).join('');

            // Auto-select first RUNNING server if none selected, otherwise first server
            if (!selectedServer && servers.length > 0) {
                const runningServer = servers.find(s => s.status === 'RUNNING');
                selectServer(runningServer || servers[0]);
            }
        }

        function selectServer(server) {
            selectedServer = server;
            renderServers(workspaces.find(w => w.rootUri === selectedWorkspace)?.lspServers || []);
            loadConsole(server);
        }

        function showPlaceholder() {
            document.getElementById('console-area').innerHTML = `
                <div class="placeholder">
                    ← Select an LSP server to view console
                </div>
            `;
        }

        let currentConsoleTab = 'traces';
        let currentTraceLevel = 'verbose';
        let currentServerId = null;

        async function changeTraceLevel(level) {
            if (!currentServerId) {
                console.error('No server selected');
                return;
            }

            try {
                const response = await fetch(`/api/admin/config/servers/${currentServerId}/trace`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trace: level })
                });

                if (!response.ok) {
                    throw new Error('Failed to save trace level');
                }

                currentTraceLevel = level;
                console.log('Trace level changed to:', level, 'for server:', currentServerId);

                // Show/hide fold button based on level
                const foldButton = document.getElementById('fold-button');
                if (foldButton) {
                    foldButton.style.display = (level === 'messages') ? 'none' : 'inline-block';
                }

                // Re-render console with new filter
                renderConsole();
            } catch (error) {
                console.error('Failed to change trace level:', error);
                alert('Failed to save trace level: ' + error.message);
            }
        }

        /**
         * Filter traces based on trace level.
         * - off: show nothing
         * - messages: show all messages (header only, no body)
         * - verbose: show everything (header + body)
         */
        function shouldShowTrace(trace, level) {
            if (level === 'off') {
                return false;
            }

            // Both 'messages' and 'verbose' show all traces
            // The difference is in how they're displayed (header only vs header+body)
            return true;
        }

        async function loadConsole(server) {
            // Setup console UI with tabs
            document.getElementById('console-area').innerHTML = `
                <div class="console-wrapper">
                    <div class="console-header">
                        <div class="console-title">
                            ${server.name}
                            <span class="status-indicator" id="sse-status"></span>
                        </div>
                        <div class="console-tabs">
                            <button class="tab-button active" onclick="switchConsoleTab('traces')">Traces</button>
                            <button class="tab-button" onclick="switchConsoleTab('details')">Details</button>
                            <button class="tab-button" onclick="switchConsoleTab('install')">Install</button>
                        </div>
                        <div class="console-controls" id="traces-controls">
                            <label style="color: #cccccc; font-size: 0.85rem;">
                                Trace Level:
                                <select id="trace-level" onchange="changeTraceLevel(this.value)" style="margin-left: 0.5rem; background: #3e3e42; color: #cccccc; border: 1px solid #555; padding: 0.25rem 0.5rem; border-radius: 3px;">
                                    <option value="off">Off</option>
                                    <option value="messages">Messages</option>
                                    <option value="verbose" selected>Verbose</option>
                                </select>
                            </label>
                            <button onclick="toggleAllTraces()" id="fold-button">Unfold All</button>
                            <button onclick="clearConsole()">Clear</button>
                        </div>
                    </div>
                    <div class="tab-content">
                        <div id="traces-tab" class="tab-panel active">
                            <div class="console" id="console-output" tabindex="0"></div>
                        </div>
                        <div id="details-tab" class="tab-panel">
                            <div class="details-panel" id="details-content">
                                <p>Loading...</p>
                            </div>
                        </div>
                        <div id="install-tab" class="tab-panel">
                            <div class="install-panel">
                                <h3>Installer Configuration</h3>
                                <div class="install-info">
                                    <p><strong>Server:</strong> ${server.name}</p>
                                    <p><strong>ID:</strong> ${server.id}</p>
                                </div>
                                <div class="installer-editor">
                                    <div class="editor-header">
                                        <span>installer.json</span>
                                        <div class="editor-actions">
                                            <button class="editor-btn" onclick="saveInstallerJson('${server.id}')" title="Save">💾 Save</button>
                                            <button class="editor-btn" onclick="resetInstallerJson('${server.id}')" title="Reset">↻ Reset</button>
                                        </div>
                                    </div>
                                    <textarea id="installer-json-editor" class="json-editor" spellcheck="false"></textarea>
                                </div>
                                <button class="install-button" onclick="runInstaller('${server.id}')">▶ Run Installer</button>

        function connectSSE(workspaceUri, serverId) {
            if (eventSource) {
                eventSource.close();
            }

            const statusIndicator = document.getElementById('sse-status');
            if (!statusIndicator) return;

            eventSource = new EventSource('/api/admin/traces/stream');

            eventSource.onopen = () => {
                statusIndicator.className = 'status-indicator connected';
            };

            eventSource.onmessage = (event) => {
                const trace = JSON.parse(event.data);

                // Store traces per server
                if (!tracesByServer[trace.serverId]) {
                    tracesByServer[trace.serverId] = [];
                }
                tracesByServer[trace.serverId].push(trace);

                // Keep only last 200 traces per server
                if (tracesByServer[trace.serverId].length > 200) {
                    tracesByServer[trace.serverId] = tracesByServer[trace.serverId].slice(-200);
                }

                // Only render if this trace is for the currently selected server
                if (trace.workspaceUri === workspaceUri && trace.serverId === serverId) {
                    renderConsole();
                }
            };

            eventSource.onerror = () => {
                if (statusIndicator) {
                    statusIndicator.className = 'status-indicator disconnected';
                }
            };
        }

        function renderConsole() {
            const container = document.getElementById('console-output');
            if (!container) return;

            // Get traces for current server
            const traces = tracesByServer[currentServerId] || [];

            // Filter traces based on current level
            const filteredTraces = traces.filter(trace => shouldShowTrace(trace, currentTraceLevel));

            if (filteredTraces.length === 0) {
                const message = currentTraceLevel === 'off'
                    ? 'Traces are disabled (level: off)'
                    : 'No LSP trace messages yet.';
                container.innerHTML = `<div style="text-align: center; padding: 2rem; color: #858585;">${message}</div>`;
                return;
            }

            container.innerHTML = filteredTraces.map((trace, index) => {
                const content = trace.jsonContent;

                // Parse the trace: first line is header, rest is body
                const lines = content.split('\n');
                const headerLine = lines[0]; // [Trace - HH:mm:ss] ...

                // Messages mode: show only header line, no folding
                if (currentTraceLevel === 'messages') {
                    return `
                        <div class="trace-line">
                            <div style="padding: 0.25rem; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem; color: #cccccc;">${escapeHtml(headerLine)}</div>
                        </div>
                    `;
                }

                // Verbose mode: header + body folded by default
                const body = lines.slice(1).join('\n').trim();
                const hasBody = body.length > 0;

                // If no body, display like messages mode (no toggle arrow)
                if (!hasBody) {
                    return `
                        <div class="trace-line">
                            <div style="padding: 0.25rem; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem; color: #cccccc;">${escapeHtml(headerLine)}</div>
                        </div>
                    `;
                }

                const fullContent = headerLine + '\n' + body;

                return `
                    <div class="trace-line" onmouseenter="showTooltip(event, ${index}, true)" onmouseleave="hideTooltip(${index})">
                        <div class="trace-header folded" id="header-${index}"
                             onmousedown="onHeaderMouseDown(${index})"
                             onmouseup="onHeaderMouseUp(${index})"
                             style="padding: 0.25rem; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem;">
                            <span class="trace-toggle" id="toggle-${index}" style="margin-right: 0.5rem;">▶</span>
                            <span class="trace-header-text" style="color: #cccccc;">${escapeHtml(headerLine)}</span>
                        </div>
                        <div class="trace-body collapsed" id="body-${index}" style="font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem; color: #cccccc;">${escapeHtml(body)}</div>
                        <div class="trace-tooltip" id="tooltip-${index}">${escapeHtml(fullContent)}</div>
                    </div>
                `;
            }).join('');

            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showTooltip(event, index, isFolded) {
            if (!isFolded) return;

            const body = document.getElementById('body-' + index);
            if (!body || !body.classList.contains('collapsed')) return;

            const tooltip = document.getElementById('tooltip-' + index);
            if (!tooltip) return;

            // Position tooltip near mouse
            const x = event.clientX + 15;
            const y = event.clientY + 15;

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
            tooltip.style.display = 'block';
        }

        function hideTooltip(index) {
            const tooltip = document.getElementById('tooltip-' + index);
            if (tooltip) {
                tooltip.style.display = 'none';
            }
        }

        let mouseDownTime = 0;
        let mouseDownIndex = -1;

        function onHeaderMouseDown(index) {
            mouseDownTime = Date.now();
            mouseDownIndex = index;
        }

        function onHeaderMouseUp(index) {
            // Si c'est un click rapide (< 200ms) et au même endroit, toggle
            const timeDiff = Date.now() - mouseDownTime;
            if (timeDiff < 200 && mouseDownIndex === index) {
                // Vérifier si du texte a été sélectionné
                const selection = window.getSelection();
                if (!selection || selection.toString().length === 0) {
                    toggleTrace(index);
                }
            }
            mouseDownIndex = -1;
        }

        function toggleTrace(index) {
            const body = document.getElementById('body-' + index);
            const toggle = document.getElementById('toggle-' + index);
            const header = document.getElementById('header-' + index);
            const traceLine = header.parentElement;

            if (body.classList.contains('expanded')) {
                body.classList.remove('expanded');
                body.classList.add('collapsed');
                toggle.textContent = '▶';
                header.classList.add('folded');

                // Ajouter le tooltip pour les traces pliées
                if (!traceLine.querySelector('.trace-tooltip')) {
                    const headerText = header.querySelector('.trace-header-text').textContent;
                    const bodyText = body.textContent;
                    const fullContent = headerText + '\n' + bodyText;

                    const tooltip = document.createElement('div');
                    tooltip.className = 'trace-tooltip';
                    tooltip.id = 'tooltip-' + index;
                    tooltip.textContent = fullContent;
                    traceLine.appendChild(tooltip);

                    // Ajouter les event listeners
                    traceLine.onmouseenter = (e) => showTooltip(e, index, true);
                    traceLine.onmouseleave = () => hideTooltip(index);
                }
            } else {
                body.classList.remove('collapsed');
                body.classList.add('expanded');
                toggle.textContent = '▼';
                header.classList.remove('folded');

                // Retirer le tooltip pour les traces dépliées
                const tooltip = traceLine.querySelector('.trace-tooltip');
                if (tooltip) {
                    tooltip.remove();
                }

                // Retirer les event listeners
                traceLine.onmouseenter = null;
                traceLine.onmouseleave = null;
            }
        }

        let allFolded = true; // Par défaut: tout plié

        function toggleAllTraces() {
            const consoleOutput = document.getElementById('console-output');
            if (!consoleOutput) return;

            const bodies = consoleOutput.querySelectorAll('.trace-body');
            const toggles = consoleOutput.querySelectorAll('.trace-toggle');
            const foldButton = document.getElementById('fold-button');

            if (allFolded) {
                // Unfold all
                bodies.forEach(body => {
                    body.classList.remove('collapsed');
                    body.classList.add('expanded');
                });
                toggles.forEach(toggle => {
                    toggle.textContent = '▼';
                });
                foldButton.textContent = 'Fold All';
                allFolded = false;
            } else {
                // Fold all
                bodies.forEach(body => {
                    body.classList.remove('expanded');
                    body.classList.add('collapsed');
                });
                toggles.forEach(toggle => {
                    toggle.textContent = '▶';
                });
                foldButton.textContent = 'Unfold All';
                allFolded = true;
            }
        }

        function searchTraces(query) {
            const consoleOutput = document.getElementById('console-output');
            if (!consoleOutput) return;

            const traceElements = consoleOutput.querySelectorAll('.trace-entry');

            if (!query || query.trim() === '') {
                // Reset: show all traces, remove highlights
                traceElements.forEach(el => {
                    el.style.display = '';
                    el.querySelectorAll('.search-highlight').forEach(mark => {
                        const parent = mark.parentNode;
                        parent.replaceChild(document.createTextNode(mark.textContent), mark);
                        parent.normalize();
                    });
                });
                return;
            }

            const lowerQuery = query.toLowerCase();
            let matchCount = 0;

            traceElements.forEach(el => {
                const text = el.textContent.toLowerCase();
                const matches = text.includes(lowerQuery);

                if (matches) {
                    el.style.display = '';
                    matchCount++;

                    // Open details if match is in JSON content
                    const details = el.querySelector('details');
                    if (details) {
                        const detailsText = details.textContent.toLowerCase();
                        if (detailsText.includes(lowerQuery)) {
                            details.open = true;
                        }
                    }

                    // TODO: Highlight matching text (optional enhancement)
                } else {
                    el.style.display = 'none';
                }
            });

            console.log(`Found ${matchCount} matching traces`);
        }

        // Search functionality
        let searchMatches = [];

        let fullTextSelected = false;

        document.addEventListener('keydown', (e) => {
            const consoleOutput = document.getElementById('console-output');

            // Ctrl+A to select all console content
            if (e.ctrlKey && e.key === 'a' && consoleOutput && selectedServer) {
                // Vérifier si le focus est dans la console ou pas dans un input
                const activeElement = document.activeElement;
                if (activeElement.tagName !== 'INPUT' && activeElement.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    selectAllConsoleContent();
                }
            }

            // Ctrl+C après Ctrl+A pour copier tout (incluant plié)
            if (e.ctrlKey && e.key === 'c' && fullTextSelected && selectedServer) {
                e.preventDefault();
                copyFullConsoleContent();
            }

            // Ctrl+F to open search - seulement si un serveur est sélectionné
            if (e.ctrlKey && e.key === 'f') {
                if (consoleOutput && selectedServer) {
                    e.preventDefault();
                    openSearch();
                }
            }

            // Escape to close search
            if (e.key === 'Escape') {
                closeSearch();
            }
        });
