# HTTP Server Configuration
quarkus.http.port=7654
quarkus.http.host=0.0.0.0

# Enable HTTP/2 to avoid SSE connection limits (6 connections max in HTTP/1.1)
# Note: HTTP/2 over plain HTTP (h2c) requires explicit client support
quarkus.http.http2=true
quarkus.http.insecure-requests=enabled

# Increase thread pool for SSE connections
quarkus.thread-pool.max-threads=200
quarkus.thread-pool.core-threads=10

# HTTP IO threads (separate from worker threads)
quarkus.http.io-threads=8

# Application info
quarkus.application.name=MCP Language Tools
quarkus.application.version=0.1.0-SNAPSHOT

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.redhat.mcp.lsp.orchestrator".level=DEBUG
quarkus.log.category."com.redhat.mcp.languagetools.admin".level=DEBUG

# Dev UI
quarkus.dev-ui.always-include=true

# MCP Traffic logging
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=50000